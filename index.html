<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home | Yony OS</title>
  <link rel="stylesheet" href="main.css">
  <link rel="stylesheet" href="styles/home.css">

</head>
<body>
  <!-- Nav bar -->
  <nav class="nav-bar">
    <a class="active" href="index.html">>INIT</a>
    <a href="pages/about.html">>ABOUT</a>
    <a href="pages/projects.html">>PROJECTS</a>
    <a href="pages/contact.html">>CONTACT</a>
  </nav>

  <main>
    <!-- Terminal Row 1 -->
    <section class="terminal-row">

      <!--Boot Screen Window-->
      <div class="terminal-box boot-screen">
        <div class="terminal-header">
          user@root~$: [STATUS: ACTIVE]
        </div>

        <div class="terminal-text" id="boot-text"> 
        <!-- Boot up text is loaded bys JS-->
        </div>
      </div>
    </section>

  <!-- Terminal Row 2-->
    <section class="terminal-row">

      <!--Side bar image-->
      <div class="globe-panel">
        <img src="assets/gifs/globe.gif" alt="Animated Globe">
      </div>

      <!-- README Window -->
      <div class="terminal-box readme">
        <div class="terminal-header">
          /$README...
        </div>

          <div class="terminal-text" id="readme-text"> 
            <!-- Read me text is loaded bys JS-->
          </div>
      </div>
    </section>

    <!-- Terminal Row 3 -->
    <section class="terminal-row">

      <!-- Current Transmission Window-->
      <div class="terminal-box current-transmission">
        <div class="terminal-header">/$CURRENT_TRANSMISSION...</div>

  <div class="article-preview">

    <img src="assets/images/enter-dunegon.jpeg" alt="Project thumbnail">

    <div class="article-content">
      <h3 id="post-title"></h3>
      <p id="post-desc"></p>
      <a id="post-link" href="#">>view post</a>
    </div>

  </div>

</div>
      <!-- Previous Transmission Window-->
      <div class="terminal-box previous-transmissions">
        <div class="terminal-header">
          /$PREVIOUS_TRANSMISSIONS...
        </div>
        <div id="previous-posts"></div>
      </div>

      <!-- Additional Links Window-->
      <div class="terminal-box quick-links">
        <div class="terminal-header">
          /$LINKS...
        </div>

          <div class="terminal-text">
            ><a href="#">journal...</a><br>
            ><a href="#">gallery...</a><br>
            ><a href="#">bookshelf...</a><br>
            ><a href="/pages/projects/arcade/arcade.html">arcade...</a><br>
          </div>
        <!-- Side bar image-->
          <img
            class="sidebar-icon"
            src="assets/images/rayquza.jpg"
            alt="Rayquaza Icon">
      </div>
    </section>

  </main>
  <script src="scripts/posts.js" defer></script>
  <script src="scripts/typewriter.js" defer></script>

</body>
</html>
